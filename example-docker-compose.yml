services:
  traefik:
    image: traefik:latest
    container_name: Traefik
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    environment:
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
      - DUCKDNS_PROPAGATION_TIMEOUT=300
    volumes:
      - ${HOME_DIRECTORY}/traefik:/etc/traefik
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - backend
      - proxy-auth

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:latest
    container_name: Pocket_ID
    restart: unless-stopped
    environment:
      - APP_URL=${POCKET_ID_URL}
      - ENCRYPTION_KEY=${POCKET_ID_ENCRYPTION_KEY}
      - TRUST_PROXY=true
      - PUID=1000
      - PGID=1000
    volumes:
      - ${HOME_DIRECTORY}/pocket-id/data:/app/data
    healthcheck:
      test: [ "CMD", "/app/pocket-id", "healthcheck" ]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s
    networks:
      - proxy-auth

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: OAuth2_Proxy
    environment:
      # --- Provider ---
      - OAUTH2_PROXY_PROVIDER=oidc
      - OAUTH2_PROXY_OIDC_ISSUER_URL=${POCKET_ID_URL}
      - OAUTH2_PROXY_CLIENT_ID=${OAUTH2_CLIENT_ID}
      - OAUTH2_PROXY_CLIENT_SECRET=${OAUTH2_CLIENT_SECRET}
      - OAUTH2_PROXY_CODE_CHALLENGE_METHOD=S256
      # --- Redirects & Upstreams ---
      - OAUTH2_PROXY_REDIRECT_URL=${POCKET_ID_URL}/oauth2/callback
      - OAUTH2_PROXY_UPSTREAMS=static://202
      - OAUTH2_PROXY_REVERSE_PROXY=true
      - OAUTH2_PROXY_TRUSTED_PROXY_IPS=${TRUSTED_PROXY_NETWORK}
      # --- Cookies & Whitelist ---
      - OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_COOKIE_SECRET}
      - OAUTH2_PROXY_COOKIE_SECURE=true
      - OAUTH2_PROXY_COOKIE_DOMAINS=${PROXY_DOMAIN}
      - OAUTH2_PROXY_COOKIE_EXPIRE=168h
      - OAUTH2_PROXY_COOKIE_REFRESH=1h
      - OAUTH2_PROXY_WHITELIST_DOMAINS=${PROXY_DOMAIN}
      - OAUTH2_PROXY_EMAIL_DOMAINS=*
      - OAUTH2_PROXY_SESSION_STORE_TYPE=redis
      - OAUTH2_PROXY_REDIS_CONNECTION_URL=${REDIS_URL}
      # --- UI ---
      - OAUTH2_PROXY_SKIP_PROVIDER_BUTTON=true
      # -- Authz Group Based Access Control --
      - OAUTH2_PROXY_OIDC_GROUPS_CLAIM=groups
      - OAUTH2_PROXY_SET_XAUTHREQUEST=true
      - OAUTH2_PROXY_OIDC_USE_ID_TOKEN=true
      - OAUTH2_PROXY_SCOPE=openid profile email groups
    networks:
      - proxy-auth
    depends_on:
      - oauth2-proxy-redis
    restart: unless-stopped

  oauth2-proxy-redis:
    image: redis:alpine
    container_name: OAuth2_Proxy_Redis
    command: redis-server --appendonly yes
    restart: unless-stopped
    volumes:
      - ${HOME_DIRECTORY}/oauth2-proxy/redis:/data
    networks:
     - proxy-auth

  authz:
    image: arm64buidz/oauth2-proxy-authz:2026.6
    container_name: OAuth2_Proxy_Authz
    environment:
      - REDIS_URL=${REDIS_URL}
      - POCKET_ID_URL=${POCKET_ID_URL}
      - META_WRITE_INTERVAL=60
    networks:
      - proxy-auth
    depends_on:
      - oauth2-proxy-redis
    restart: unless-stopped

  session-admin:
    image: arm64buidz/oauth2-proxy-session-admin:2026.6
    container_name: OAuth2_Proxy_Session_Admin
    environment:
      - REDIS_URL=${REDIS_URL}
      - SESSION_PREFIX=_oauth2_proxy-
      - CORS_ORIGINS=${POCKET_ID_URL}
    networks:
      - proxy-auth
    depends_on:
      - oauth2-proxy-redis
    restart: unless-stopped

networks:
  proxy-auth:
  backend: